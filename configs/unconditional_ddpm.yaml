unconditional: true

model:
  type: unet
  in_channels: 1
  out_channels: 1
  base_channels: 64
  channel_mult: [1, 2, 4]
  time_emb_dim: 256

ddpm:
  T: 200
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: cosine
  prediction: v
  min_snr_gamma: 5.0

training:
  batch_size: 32
  lr: 1.0e-4
  epochs: 80
  weight_decay: 0.0
  scheduler: cosine
  regime: exact

data:
  train: data/train.npz
  val: data/val.npz

logging:
  log_dir: experiments/unconditional_ddpm
  save_every: 20
