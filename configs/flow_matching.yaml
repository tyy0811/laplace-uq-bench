model:
  type: unet
  in_channels: 9
  out_channels: 1
  base_channels: 64
  channel_mult: [1, 2, 4]
  time_emb_dim: 256

flow_matching:
  use_ot: true
  n_sample_steps: 50

training:
  batch_size: 64
  lr: 1.0e-4
  epochs: 80
  weight_decay: 0.0
  scheduler: cosine
  regime: mixed

data:
  train: data/train.npz
  val: data/val.npz

logging:
  log_dir: experiments/flow_matching
  save_every: 20
