model:
  type: unet
  in_channels: 8
  out_channels: 1
  base_channels: 64
  channel_mult: [1, 2, 4]

ensemble:
  n_members: 5
  seeds: [200, 201, 202, 203, 204]

training:
  batch_size: 64
  lr: 1.0e-3
  epochs: 50
  weight_decay: 1.0e-4
  scheduler: cosine
  regime: mixed

data:
  train: data/train.npz
  val: data/val.npz

logging:
  log_dir: experiments/ensemble_phase2
  save_every: 10
