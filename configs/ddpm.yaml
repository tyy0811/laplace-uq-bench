model:
  type: unet
  in_channels: 9
  out_channels: 1
  base_channels: 64
  channel_mult: [1, 2, 4]
  time_emb_dim: 256

ddpm:
  T: 200
  beta_start: 1.0e-4
  beta_end: 0.02

training:
  batch_size: 32
  lr: 2.0e-4
  epochs: 60
  weight_decay: 0.0
  scheduler: cosine

data:
  train: data/train.npz
  val: data/val.npz

logging:
  log_dir: experiments/ddpm
  save_every: 20
